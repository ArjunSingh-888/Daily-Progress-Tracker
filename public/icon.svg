<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#grad)"/>
  
  <!-- Circular Progress Ring -->
  <circle cx="256" cy="200" r="80" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="16"/>
  <circle cx="256" cy="200" r="80" fill="none" stroke="white" stroke-width="16" 
          stroke-dasharray="376.99" stroke-dashoffset="94.25" 
          stroke-linecap="round" transform="rotate(-90 256 200)"/>
  
  <!-- Percentage Text -->
  <text x="256" y="210" font-family="Arial, sans-serif" font-size="60" font-weight="bold" 
        fill="white" text-anchor="middle">75%</text>
  
  <!-- Checkmarks -->
  <g transform="translate(120, 340)">
    <circle cx="0" cy="0" r="20" fill="white"/>
    <path d="M-8,0 L-3,8 L8,-8" stroke="#6366f1" stroke-width="4" stroke-linecap="round" fill="none"/>
  </g>
  
  <g transform="translate(256, 340)">
    <circle cx="0" cy="0" r="20" fill="white"/>
    <path d="M-8,0 L-3,8 L8,-8" stroke="#6366f1" stroke-width="4" stroke-linecap="round" fill="none"/>
  </g>
  
  <g transform="translate(392, 340)">
    <circle cx="0" cy="0" r="20" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- Lines (goals) -->
  <line x1="100" y1="420" x2="180" y2="420" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="236" y1="420" x2="316" y2="420" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="372" y1="420" x2="452" y2="420" stroke="rgba(255,255,255,0.3)" stroke-width="4" stroke-linecap="round"/>
</svg>
